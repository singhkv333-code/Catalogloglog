  <head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preconnect" href="https://pjsyvlhwuhdibpahputx.supabase.co" crossorigin/>
  <link rel="stylesheet" href="tw.css"/>
    <link rel="stylesheet" href="styles.css"/>
        <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;icon_names=add,add_location,arrow_back,arrow_forward,arrow_outward,auto_awesome,bookmark,bookmarks,bug_report,chat,chat_bubble,check_circle,close,delete,done,edit,expand_more,favorite,format_list_bulleted,group,lock,mail,playlist_add,public,restaurant,restaurant_menu,schedule,search,send,star,support_agent,tune,visibility_off&amp;display=swap" rel="stylesheet"/>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .editorial-shadow {
        box-shadow: 0 12px 40px rgba(29, 27, 23, 0.06);
      }
      .stack-image-1 {
        transform: rotate(-2deg) translateX(-4px);
      }
      .stack-image-2 {
        transform: rotate(1deg) translateX(2px);
      }
      .glass-nav {
        backdrop-filter: blur(16px);
        background-color: rgba(254, 249, 241, 0.8);
      }
  /* Mobile nav */
  #mobileMenu { max-height: 0; overflow: hidden; transition: max-height 350ms ease; }
  #mobileMenu.open { max-height: 400px; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
    <!-- Top Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass-nav">
  <div class="flex justify-between items-center w-full px-6 md:px-12 py-5 md:py-8 max-w-screen-2xl mx-auto">
    <div class="flex items-center gap-8 md:gap-12">
      <a class="text-3xl font-headline italic text-[#1d1b17] dark:text-[#fef9f1] tracking-tighter cursor-pointer" href="/" style="text-decoration:none">Catalog</a>
      <div class="hidden md:flex items-center gap-8">
        <a class="text-[#1d1b17] opacity-70 hover:opacity-100 hover:text-[#8b1a1a] transition-all duration-300 font-sans uppercase tracking-widest text-xs" href="lists">LISTS</a>
        <a class="text-[#1d1b17] opacity-70 hover:opacity-100 hover:text-[#8b1a1a] transition-all duration-300 font-sans uppercase tracking-widest text-xs" href="been">BEEN</a>
        <a class="text-[#1d1b17] opacity-70 hover:opacity-100 hover:text-[#8b1a1a] transition-all duration-300 font-sans uppercase tracking-widest text-xs" href="saved">SAVED</a>
        <a class="text-[#1d1b17] opacity-70 hover:opacity-100 hover:text-[#8b1a1a] transition-all duration-300 font-sans uppercase tracking-widest text-xs" href="friends">FRIENDS</a>
        <a class="text-[#1d1b17] opacity-70 hover:opacity-100 hover:text-[#8b1a1a] transition-all duration-300 font-sans uppercase tracking-widest text-xs" href="blog">BLOG</a>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button class="flex items-center justify-center" id="navAccountBtn" type="button" style="min-width:2.5rem;min-height:2.5rem;visibility:hidden"></button>
      <button class="md:hidden flex flex-col justify-center items-center w-10 h-10 gap-1.5" id="navHamburger" aria-label="Open menu" type="button">
        <span class="block w-5 h-0.5 bg-on-surface transition-all" id="hbLine1"></span>
        <span class="block w-5 h-0.5 bg-on-surface transition-all" id="hbLine2"></span>
        <span class="block w-5 h-0.5 bg-on-surface transition-all" id="hbLine3"></span>
      </button>
    </div>
  </div>
  <!-- Mobile dropdown -->
  <div id="mobileMenu" class="md:hidden glass-nav border-t border-on-surface/10">
    <div class="flex flex-col px-6 py-4 gap-5">
      <a class="text-[#1d1b17] opacity-70 hover:opacity-100 font-sans uppercase tracking-widest text-xs" href="lists">LISTS</a>
      <a class="text-[#1d1b17] opacity-70 hover:opacity-100 font-sans uppercase tracking-widest text-xs" href="been">BEEN</a>
      <a class="text-[#1d1b17] opacity-70 hover:opacity-100 font-sans uppercase tracking-widest text-xs" href="saved">SAVED</a>
      <a class="text-[#1d1b17] opacity-70 hover:opacity-100 font-sans uppercase tracking-widest text-xs" href="friends">FRIENDS</a>
      <a class="text-[#1d1b17] opacity-70 hover:opacity-100 font-sans uppercase tracking-widest text-xs" href="blog">BLOG</a>
    </div>
  </div>
</nav>
<script>
  (function(){
    var btn=document.getElementById("navHamburger"),menu=document.getElementById("mobileMenu"),l1=document.getElementById("hbLine1"),l2=document.getElementById("hbLine2"),l3=document.getElementById("hbLine3"),open=false,skip=false;
    if(!btn)return;
    function closeMenu(){open=false;menu.classList.remove("open");l1.style.transform="";l2.style.opacity="1";l3.style.transform="";}
    btn.addEventListener("click",function(){skip=true;open=!open;menu.classList.toggle("open",open);l1.style.transform=open?"translateY(8px) rotate(45deg)":"";l2.style.opacity=open?"0":"1";l3.style.transform=open?"translateY(-8px) rotate(-45deg)":"";setTimeout(function(){skip=false;},0);});
    document.addEventListener("click",function(e){if(skip)return;if(open&&!menu.contains(e.target)&&e.target!==btn&&!btn.contains(e.target)){closeMenu();}});
  })();
</script>

    <main class="pt-24 md:pt-32 pb-16 md:pb-24 max-w-screen-2xl mx-auto px-6 md:px-12">
      <!-- Page Header -->
      <header class="mb-10 md:mb-16">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 md:gap-8">
          <div>
            <span class="font-label uppercase tracking-[0.2em] text-[0.65rem] text-primary font-bold block mb-2">CURATED COLLECTIONS</span>
            <h1 class="font-headline italic text-5xl md:text-7xl lg:text-8xl text-on-surface tracking-tighter leading-none">Lists</h1>
          </div>
          <div class="flex flex-col sm:flex-row gap-3 md:gap-4 w-full md:w-auto">
            <div class="relative w-full sm:w-80">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm" data-icon="search">search</span>
              <input class="w-full bg-surface-container-lowest border-none rounded-full py-3 pl-12 pr-6 text-sm font-label focus:ring-1 focus:ring-primary-container outline-none transition-all editorial-shadow" id="listSearchInput" placeholder="Search curated lists..." type="text" />
            </div>
            <button class="w-full sm:w-auto bg-gradient-to-br from-primary to-primary-container text-on-primary px-8 py-3 rounded-full font-label text-xs font-bold tracking-widest uppercase flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all editorial-shadow" id="createListBtn" type="button">
              <span class="material-symbols-outlined text-sm" data-icon="add">add</span>
              Create List
            </button>
          </div>
        </div>
        <!-- Toggle Switch -->
        <div class="mt-8 md:mt-12 flex items-center gap-8 border-b-2 border-surface-container-high pb-4" id="listsToggle">
          <button class="font-label text-sm font-bold tracking-tight text-primary relative" data-view="discover" id="discoverTab" type="button">
            Discover
            <div class="absolute -bottom-[18px] left-0 right-0 h-0.5 bg-primary"></div>
          </button>
          <button class="font-label text-sm font-bold tracking-tight text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity" data-view="mine" id="mineTab" type="button">
            My Lists
          </button>
        </div>
      </header>

      <!-- Bento Grid Feed -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-6 md:gap-x-12 gap-y-10 md:gap-y-16" id="listsGrid">
        <!-- Filled by lists.js -->
      </div>

      <!-- Pagination / Load More (kept for design; hidden by JS for now) -->
      <div class="mt-24 flex justify-center" id="loadMoreWrap">
        <button class="bg-surface-container-lowest text-on-surface px-10 py-4 rounded-full font-label text-[10px] font-bold tracking-widest uppercase editorial-shadow hover:bg-surface transition-colors flex items-center gap-3" id="loadMoreBtn" type="button">
          Load more collections
          <span class="material-symbols-outlined text-sm" data-icon="expand_more">expand_more</span>
        </button>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-[#1c1410] dark:bg-[#000000] w-full px-6 md:px-12 py-12 md:py-16 flex flex-col items-center gap-6 text-center">
      <span class="text-2xl font-headline italic text-[#fef9f1]">Catalog</span>
      <p class="font-sans text-sm text-[#e7e2db] opacity-60">&copy; 2026 Catalog.<br>Food social network for explorers.</p>
      <div class="flex flex-col sm:flex-row gap-4 sm:gap-8 mt-4 items-center">
        <a class="font-sans text-sm text-[#e7e2db] opacity-60 hover:opacity-100 hover:text-[#fef9f1] transition-all" href="about">About</a>
        <a class="font-sans text-sm text-[#e7e2db] opacity-60 hover:opacity-100 hover:text-[#fef9f1] transition-all" href="support">Support</a>
        <a class="font-sans text-sm text-[#e7e2db] opacity-60 hover:opacity-100 hover:text-[#fef9f1] transition-all" href="terms">Terms of Service</a>
        <a class="font-sans text-sm text-[#e7e2db] opacity-60 hover:opacity-100 hover:text-[#fef9f1] transition-all" href="#">Instagram</a>
        
      </div>
      <div class="mt-8 flex gap-6">
        <span class="material-symbols-outlined text-[#fef9f1]/40" data-icon="restaurant">restaurant</span>
        <span class="material-symbols-outlined text-[#fef9f1]/40" data-icon="public">public</span>
        <span class="material-symbols-outlined text-[#fef9f1]/40" data-icon="favorite">favorite</span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
    <script type="module" src="./lists.js"></script>
  </body>
</html>
