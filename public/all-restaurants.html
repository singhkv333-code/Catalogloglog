        <a class="text-[#1d1b17] opacity-70 hover:opacity-100 hover:text-[#8b1a1a] transition-all duration-300 font-sans uppercase tracking-widest text-xs" href="blog">BLOG</a>
      </div>
    </div>

      <button class="flex items-center justify-center" id="navAccountBtn" type="button" style="min-width:2.5rem;min-height:2.5rem;visibility:hidden"></button>
      <button class="md:hidden flex flex-col justify-center items-center w-10 h-10 gap-1.5" id="navHamburger" aria-label="Open menu" type="button">
        <span class="block w-5 h-0.5 bg-on-surface transition-all" id="hbLine1"></span>
        <span class="block w-5 h-0.5 bg-on-surface transition-all" id="hbLine2"></span>

<script>
  (function(){
    var btn=document.getElementById("navHamburger"),menu=document.getElementById("mobileMenu"),l1=document.getElementById("hbLine1"),l2=document.getElementById("hbLine2"),l3=document.getElementById("hbLine3"),open=false,skip=false;
    if(!btn)return;
    function closeMenu(){open=false;menu.classList.add("hidden");l1.style.transform="";l2.style.opacity="1";l3.style.transform="";}
    btn.addEventListener("click",function(){skip=true;open=!open;menu.classList.toggle("hidden",!open);l1.style.transform=open?"translateY(8px) rotate(45deg)":"";l2.style.opacity=open?"0":"1";l3.style.transform=open?"translateY(-8px) rotate(-45deg)":"";setTimeout(function(){skip=false;},0);});
    document.addEventListener("click",function(e){if(skip)return;if(open&&!menu.contains(e.target)&&e.target!==btn&&!btn.contains(e.target)){closeMenu();}});
  })();
</script>

    <main class="pt-24 md:pt-32 pb-16 md:pb-24">

      <!-- Hero header -->
      <div class="max-w-screen-2xl mx-auto px-6 md:px-12 mb-10 md:mb-14">
        <header class="mb-8 md:mb-12">
          <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 md:gap-8">
            <div>
              <span class="font-label uppercase tracking-[0.2em] text-[0.65rem] text-primary font-bold block mb-2">DISCOVER</span>
              <h1 class="font-headline italic text-5xl md:text-7xl lg:text-8xl text-on-surface tracking-tighter leading-none">
                All Restaurants
              </h1>
            </div>

            <!-- Search -->
            <div class="relative w-full md:w-[420px]">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">search</span>
              <input
                class="w-full bg-surface-container-lowest border-none rounded-full py-3 pl-12 pr-14 text-sm font-label focus:ring-1 focus:ring-primary-container outline-none transition-all editorial-shadow"
                id="allSearchInput"
                placeholder="Search restaurants, cuisine, area…"
                type="search"
              />
              <button
                aria-label="Search"
                class="absolute right-2 top-1/2 -translate-y-1/2 bg-primary p-2 rounded-full flex items-center justify-center text-white"
                id="allSearchBtn"
                type="button"
              >
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
              </button>
            </div>
          </div>
        </header>

        <!-- Filter bar -->
        <div class="flex flex-wrap items-center gap-3">

          <!-- Mobile: toggle button (hidden on md+) -->
          <button type="button" id="filtersToggleBtn"
            class="md:hidden flex items-center gap-2 bg-surface-container-lowest rounded-full editorial-shadow px-5 py-3 hover:bg-surface-container-low transition-colors">
            <span class="material-symbols-outlined text-[16px] text-on-surface-variant">tune</span>
            <span class="font-label text-sm" id="filtersToggleLabel">Filters</span>
          </button>

          <!-- Filter controls: always visible on md+, toggled on mobile -->
          <div id="filterControls" class="hidden md:flex items-center flex-wrap gap-3">

            <!-- Cuisine custom dropdown -->
            <div class="relative" id="cuisineDropdownWrap">
              <button type="button" id="cuisineDropdownBtn"
                class="flex items-center gap-2.5 bg-surface-container-lowest rounded-full editorial-shadow px-5 py-3 cursor-pointer hover:bg-surface-container-low transition-colors">
                <span class="font-label uppercase tracking-widest text-[10px] opacity-50">Cuisine</span>
                <span class="font-label text-sm" id="cuisineDropdownLabel">All cuisines</span>
                <span class="material-symbols-outlined text-[18px] text-on-surface-variant transition-transform duration-200" id="cuisineDropdownChevron">expand_more</span>
              </button>
              <div id="cuisineDropdownPanel"
                class="hidden fixed z-50 min-w-[200px] bg-surface-container-lowest rounded-2xl editorial-shadow py-2 max-h-72 overflow-y-auto">
              </div>
            </div>

            <!-- Sort custom dropdown -->
            <div class="relative" id="sortDropdownWrap">
              <button type="button" id="sortDropdownBtn"
                class="flex items-center gap-2.5 bg-surface-container-lowest rounded-full editorial-shadow px-5 py-3 cursor-pointer hover:bg-surface-container-low transition-colors">
                <span class="font-label uppercase tracking-widest text-[10px] opacity-50">Sort</span>
                <span class="font-label text-sm" id="sortDropdownLabel">Name (A–Z)</span>
                <span class="material-symbols-outlined text-[18px] text-on-surface-variant transition-transform duration-200" id="sortDropdownChevron">expand_more</span>
              </button>
              <div id="sortDropdownPanel"
                class="hidden fixed z-50 min-w-[180px] bg-surface-container-lowest rounded-2xl editorial-shadow py-2">
                <button class="w-full text-left px-4 py-2.5 font-label text-sm hover:bg-surface-container-high transition-colors" data-sort="name">Name (A–Z)</button>
                <button class="w-full text-left px-4 py-2.5 font-label text-sm hover:bg-surface-container-high transition-colors" data-sort="rating">Rating</button>
              </div>
            </div>

            <button
              class="bg-surface-container-high text-on-surface px-6 py-3 rounded-full font-label text-[10px] font-bold tracking-widest uppercase hover:bg-surface-container-highest transition-colors editorial-shadow"
              id="clearFiltersBtn"
              type="button"
            >

            </button>
          </div>

          <!-- Live count -->
          <div class="ml-auto font-label text-xs uppercase tracking-widest opacity-50" id="allMeta"></div>
